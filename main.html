<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchOrRead — Discover Anime, Manga & Manhwa</title>
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --surface2: #1e1e2e;
      --border: #2a2a3d;
      --accent: #7c3aed;
      --text: #e2e2f0;
      --muted: #8b8ba0;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --r: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a053380 0%, var(--bg) 70%);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.82rem;
      border-left: 1px solid var(--border);
      padding-left: 16px;
    }

    /* ── Filters ── */
    .filters {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-group { display: flex; align-items: center; gap: 8px; }

    .filter-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      white-space: nowrap;
    }

    .type-pills { display: flex; gap: 5px; }

    .pill {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.82rem;
      transition: all .18s;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
    }
    select:focus { border-color: var(--accent); }

    .search-wrap { position: relative; flex: 1; min-width: 180px; }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: .9rem;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px 7px 32px;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color .18s;
    }
    .search-input:focus { border-color: var(--accent); }

    .rating-filter { display: flex; align-items: center; gap: 8px; }
    input[type="range"] { width: 90px; accent-color: var(--accent); cursor: pointer; }
    .rating-val { min-width: 28px; font-size: .82rem; font-weight: 600; }

    /* ── Main ── */
    main { padding: 22px 24px; max-width: 1440px; margin: 0 auto; }

    .results-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .results-count { color: var(--muted); font-size: .85rem; }

    .loading-spinner {
      display: none;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: .82rem;
    }
    .loading-spinner.active { display: flex; }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-banner {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      padding: 11px 15px;
      margin-bottom: 18px;
      font-size: .84rem;
      color: #f87171;
    }

    /* ── Card Grid ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      animation: fadeIn .35s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 32px rgba(124,58,237,.22);
      border-color: var(--accent);
    }

    .card-cover {
      position: relative;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--surface2);
    }

    .card-cover img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .3s;
      display: block;
    }

    .card:hover .card-cover img { transform: scale(1.05); }

    .card-format {
      position: absolute; top: 7px; left: 7px;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: .67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .fmt-anime   { background: #4f46e5; color: #fff; }
    .fmt-manga   { background: #0891b2; color: #fff; }
    .fmt-manhwa  { background: #be185d; color: #fff; }
    .fmt-manhua  { background: #b45309; color: #fff; }

    .card-score {
      position: absolute; top: 7px; right: 7px;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: .78rem;
      font-weight: 700;
    }
    .s-high { background: rgba(34,197,94,.9);  color: #fff; }
    .s-mid  { background: rgba(234,179,8,.9);  color: #111; }
    .s-low  { background: rgba(239,68,68,.9);  color: #fff; }

    .card-body {
      padding: 11px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .card-title {
      font-size: .86rem;
      font-weight: 600;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-genres { display: flex; flex-wrap: wrap; gap: 4px; }

    .genre-tag {
      padding: 2px 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: .68rem;
      color: var(--muted);
    }
    .genre-tag.active {
      background: rgba(124,58,237,.2);
      border-color: var(--accent);
      color: #a78bfa;
      font-weight: 600;
    }

    .card-synopsis {
      font-size: .76rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    .card-verdict {
      margin-top: auto;
      padding: 5px 9px;
      border-radius: 6px;
      font-size: .72rem;
      font-weight: 600;
      text-align: center;
    }
    .v-yes   { background: rgba(34,197,94,.13);  color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
    .v-maybe { background: rgba(234,179,8,.13);   color: #fbbf24; border: 1px solid rgba(234,179,8,.3); }
    .v-skip  { background: rgba(239,68,68,.13);  color: #f87171; border: 1px solid rgba(239,68,68,.3); }

    /* ── Skeletons ── */
    .skel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }
    .skel-cover {
      aspect-ratio: 2/3;
      background: var(--surface2);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .skel-body { padding: 11px; display: flex; flex-direction: column; gap: 8px; }
    .skel-line {
      height: 11px;
      background: var(--surface2);
      border-radius: 4px;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .skel-line.s { width: 55%; }
    .skel-line.xs { width: 35%; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .35; }
    }

    /* ── Empty state ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .88rem; margin-top: 6px; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.82);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 820px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      transform: scale(.96);
      transition: transform .2s;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .modal-overlay.open .modal { transform: scale(1); }

    .modal-close {
      position: absolute; top: 14px; right: 14px;
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
      transition: background .15s;
      z-index: 10;
    }
    .modal-close:hover { background: var(--border); }

    .modal-header {
      display: flex;
      gap: 22px;
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-poster {
      width: 130px;
      min-width: 130px;
      border-radius: 8px;
      overflow: hidden;
      align-self: flex-start;
    }
    .modal-poster img { width: 100%; display: block; }

    .modal-info { flex: 1; }

    .modal-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }

    .modal-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }

    .meta-chip {
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: .77rem;
    }

    .score-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }

    .big-score { font-size: 2.2rem; font-weight: 800; line-height: 1; }

    .score-meta { flex: 1; }
    .score-label { font-size: .72rem; color: var(--muted); margin-bottom: 5px; }
    .score-bar-bg { height: 7px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

    .modal-genres { display: flex; flex-wrap: wrap; gap: 5px; }

    .modal-body { padding: 22px 24px; }

    .section-title {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 10px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .section-title:first-child { margin-top: 0; }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .synopsis-text {
      font-size: .88rem;
      line-height: 1.72;
      color: var(--muted);
    }

    /* Reddit section */
    .reddit-box {
      background: var(--surface2);
      border-radius: 10px;
      padding: 15px;
    }

    .reddit-loading { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: .83rem; }

    .sentiment-bar { display: flex; height: 7px; border-radius: 4px; overflow: hidden; margin: 9px 0 5px; }
    .sent-pos { background: var(--green); }
    .sent-neu { background: var(--muted); opacity: .5; }
    .sent-neg { background: var(--red); }

    .sentiment-labels {
      display: flex;
      justify-content: space-between;
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .reddit-posts { display: flex; flex-direction: column; gap: 7px; }

    .reddit-post {
      padding: 9px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .post-title { font-size: .8rem; line-height: 1.4; margin-bottom: 4px; }
    .post-meta { font-size: .7rem; color: var(--muted); display: flex; gap: 10px; }
    .post-score-val { color: #f97316; }

    .status-tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: .67rem;
      font-weight: 600;
      letter-spacing: .03em;
    }
    .st-done      { background: rgba(34,197,94,.15);  color: #4ade80; border: 1px solid rgba(34,197,94,.3); }
    .st-airing    { background: rgba(96,165,250,.15); color: #60a5fa; border: 1px solid rgba(96,165,250,.3); }
    .st-upcoming  { background: rgba(139,139,160,.15);color: #a0a0b8; border: 1px solid rgba(139,139,160,.3); }
    .st-hiatus    { background: rgba(234,179,8,.15);  color: #fbbf24; border: 1px solid rgba(234,179,8,.3); }
    .st-cancelled { background: rgba(239,68,68,.15);  color: #f87171; border: 1px solid rgba(239,68,68,.3); }

    /* Genre picker */
    .genre-picker { position: relative; }
    .genre-picker-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: .82rem;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap;
      transition: border-color .15s;
    }
    .genre-picker-btn:hover { border-color: var(--accent); }
    .genre-picker-btn.has-selection { border-color: var(--accent); color: #a78bfa; }
    .genre-caret { font-size: .65rem; opacity: .6; }
    .genre-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      width: 300px;
      z-index: 200;
      box-shadow: 0 8px 28px rgba(0,0,0,.6);
      display: none;
    }
    .genre-dropdown.open { display: block; }
    .genre-pills-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
    .genre-pill-opt {
      padding: 4px 11px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: .78rem;
      transition: all .15s;
    }
    .genre-pill-opt:hover { border-color: var(--accent); color: var(--text); }
    .genre-pill-opt.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
    .genre-clear-btn {
      font-size: .75rem; color: var(--muted); background: none;
      border: none; cursor: pointer; padding: 2px 0;
    }
    .genre-clear-btn:hover { color: var(--text); }

    /* View toggle */
    .view-toggle { display: flex; gap: 4px; }
    .view-btn {
      width: 32px; height: 32px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .view-btn:hover { border-color: var(--accent); color: var(--text); }
    .view-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Table view */
    .title-table {
      width: 100%;
      border-collapse: collapse;
    }
    .title-table thead tr {
      border-bottom: 1px solid var(--border);
    }
    .title-table th {
      padding: 8px 12px;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      font-weight: 600;
      text-align: left;
      white-space: nowrap;
    }
    .title-table tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
    }
    .title-table tbody tr:hover { background: var(--surface2); }
    .title-table td {
      padding: 8px 12px;
      vertical-align: middle;
    }
    .tbl-thumb {
      width: 40px; min-width: 40px;
      height: 56px;
      border-radius: 4px;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }
    .tbl-title { font-size: .88rem; font-weight: 600; line-height: 1.35; }
    .tbl-sub   { font-size: .74rem; color: var(--muted); margin-top: 3px; }
    .tbl-genres { display: flex; flex-wrap: wrap; gap: 3px; }
    .tbl-score  { font-size: .9rem; font-weight: 700; white-space: nowrap; }
    .title-table th[data-col] { cursor: pointer; user-select: none; }
    .title-table th[data-col]:hover { color: var(--text); }
    .title-table th[data-col] .sort-icon { margin-left: 4px; opacity: .35; font-style: normal; }
    .title-table th[data-col].sorted .sort-icon { opacity: 1; color: var(--accent); }
    .title-table th[data-col].sorted { color: var(--text); }

    /* Verdict box */
    .verdict-box {
      border-radius: 10px;
      padding: 16px 18px;
      text-align: center;
      margin-top: 0;
    }
    .verdict-lbl { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; opacity: .7; margin-bottom: 6px; }
    .verdict-txt { font-size: .95rem; font-weight: 600; line-height: 1.5; }

    /* Platform badges */
    .platforms { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .platform-chip {
      padding: 2px 7px;
      border-radius: 4px;
      font-size: .67rem;
      font-weight: 600;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: #c4c4d4;
      white-space: nowrap;
    }
    .card-meta-row {
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }
    .meta-dot { opacity: .3; font-size: .68rem; color: var(--muted); }
    .ep-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 5px;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .ep-badge svg { flex-shrink: 0; }
    .ep-badge.eps {
      background: rgba(99,102,241,.15);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,.25);
    }
    .ep-badge.chs {
      background: rgba(20,184,166,.13);
      color: #5eead4;
      border: 1px solid rgba(20,184,166,.22);
    }
    .year-chip {
      font-size: .69rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      .tagline { display: none; }
      .filters { padding: 10px 14px; gap: 10px; }
      main { padding: 12px 14px; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 12px; }
      .modal-overlay { align-items: flex-end; padding: 0; }
      .modal { border-radius: 16px 16px 0 0; max-height: 92vh; }
      .modal-header { padding: 16px; }
      .modal-body { padding: 16px; }
      .modal-poster { width: 90px; min-width: 90px; }
      .modal-title { font-size: 1.05rem; }
      .results-bar { flex-wrap: wrap; gap: 8px; }
      .title-table { font-size: .8rem; }
      .tbl-hide { display: none; }
    }
    @media (max-width: 480px) {
      .card-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .pill { padding: 5px 10px; font-size: .78rem; }
      .filter-group { gap: 6px; }
      .modal-header { flex-direction: column; }
      .modal-poster { width: 100%; min-width: unset; max-height: 220px; object-fit: cover; }
      .modal-poster img { width: 100%; height: 220px; object-fit: cover; object-position: top; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">WatchOrRead</div>
  <div class="tagline">Find your next obsession &mdash; Anime &middot; Manga &middot; Manhwa</div>
</header>

<div class="filters">
  <div class="filter-group">
    <span class="filter-label">Type</span>
    <div class="type-pills">
      <button class="pill active" data-type="all">All</button>
      <button class="pill" data-type="anime">Anime</button>
      <button class="pill" data-type="manga">Manga</button>
      <button class="pill" data-type="manhwa">Manhwa</button>
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-label">Genre</span>
    <div class="genre-picker" id="genre-picker">
      <button class="genre-picker-btn" id="genre-btn">
        <span id="genre-btn-label">Any Genre</span>
        <span class="genre-caret">▾</span>
      </button>
      <div class="genre-dropdown" id="genre-dropdown">
        <div class="genre-pills-grid" id="genre-pills-grid"></div>
        <button class="genre-clear-btn" id="genre-clear">Clear all</button>

  <div class="filter-group">
    <span class="filter-label">Status</span>
    <div class="type-pills">
      <button class="pill active" data-status="">Any</button>
      <button class="pill" data-status="RELEASING">Ongoing</button>
      <button class="pill" data-status="FINISHED">Completed</button>
    </div>
  </div>

  <div class="filter-group rating-filter">
    <span class="filter-label">Min Rating</span>
    <input type="range" id="rating-filter" min="0" max="90" step="10" value="0">
    <span class="rating-val" id="rating-display">Any</span>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="Search titles...">
  </div>
</div>

<main>
  <div class="results-bar">
    <span class="results-count" id="results-count">Loading…</span>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="loading-spinner" id="loading-spinner">
        <div class="spinner"></div> Fetching titles…
      </div>
      <div class="view-toggle">
        <button class="view-btn active" id="btn-grid" title="Grid view">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <rect x="0" y="0" width="6" height="6" rx="1"/><rect x="8" y="0" width="6" height="6" rx="1"/>
            <rect x="0" y="8" width="6" height="6" rx="1"/><rect x="8" y="8" width="6" height="6" rx="1"/>
          </svg>
        </button>
        <button class="view-btn" id="btn-table" title="Table view">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <rect x="0" y="1" width="14" height="2" rx="1"/><rect x="0" y="6" width="14" height="2" rx="1"/>
            <rect x="0" y="11" width="14" height="2" rx="1"/>
          </svg>
        </button>
      </div>

</main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ============================================================
//  WatchOrRead — AniList GraphQL + Reddit public JSON
// ============================================================

const ANILIST = 'https://graphql.anilist.co';

function buildQuery() {
  return `
query($page:Int $perPage:Int $type:MediaType $country:CountryCode $genres:[String] $score:Int $search:String){
  Page(page:$page perPage:$perPage){
    pageInfo{hasNextPage}
    media(
      type:$type countryOfOrigin:$country genre_in:$genres
      averageScore_greater:$score search:$search
      ${S.status ? `status:${S.status}` : ''}
      sort:SCORE_DESC isAdult:false
    ){
      id
      title{romaji english}
      coverImage{large}
      genres averageScore popularity
      description(asHtml:false)
      format countryOfOrigin status
      startDate{year}
      episodes chapters
      externalLinks { url site type }
    }
  }
}`;
}

// Sentiment words
const POS = ['amazing','great','love','best','excellent','masterpiece','recommend','good','worth',
  'beautiful','underrated','gem','10/10','goat','perfect','incredible','fantastic','awesome',
  'banger','peak','top tier','must read','must watch','so good','outstanding','love it','loved it'];
const NEG = ['bad','worst','boring','dropped','disappointing','mediocre','skip','waste','trash',
  'overrated','terrible','awful','mid','generic','shallow','not worth','dog water','unwatchable',
  'confusing','rushed','predictable','clichéd'];

// ── State ──────────────────────────────────────────────────
const S = { type:'all', genres:[], minScore:0, search:'', status:'', view:'grid', sortCol:'', sortDir:'desc', loading:false };
const ALL_GENRES = ['Action','Adventure','Comedy','Drama','Fantasy','Horror','Mecha','Mystery','Psychological','Romance','Sci-Fi','Slice of Life','Sports','Supernatural','Thriller'];
let searchTimer = null;

// ── Helpers ────────────────────────────────────────────────

function stripHtml(s) {
  if (!s) return '';
  return s
    .replace(/<br\s*\/?>/gi,' ')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&#039;|&apos;/g,"'")
    .replace(/\s{2,}/g,' ').trim();
}

function mediaKind(item) {
  if (item.format === 'MANGA' || item.format === 'ONE_SHOT' || item.format === 'NOVEL') {
    if (item.countryOfOrigin === 'KR') return 'manhwa';
    if (item.countryOfOrigin === 'CN') return 'manhua';
    return 'manga';
  }
  return 'anime';
}

function title(item) { return item.title.english || item.title.romaji; }

function streamLinks(item) {
  return (item.externalLinks || []).filter(l => l.type === 'STREAMING');
}

function epCount(item) {
  if (item.episodes) return `${item.episodes} eps`;
  if (item.chapters) return `${item.chapters} ch`;
  return null;
}

function epBadgeHtml(item) {
  if (item.episodes) return `
    <span class="ep-badge eps">
      <svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor">
        <polygon points="1,0.5 8.5,4.5 1,8.5"/>
      </svg>
      ${item.episodes} eps
    </span>`;
  if (item.chapters) return `
    <span class="ep-badge chs">
      <svg width="10" height="9" viewBox="0 0 10 9" fill="currentColor">
        <rect x="0" y="0" width="10" height="1.8" rx=".9"/>
        <rect x="0" y="3.6" width="10" height="1.8" rx=".9"/>
        <rect x="0" y="7.2" width="7" height="1.8" rx=".9"/>
      </svg>
      ${item.chapters} ch
    </span>`;
  return '';
}

const STATUS_MAP = {
  FINISHED:         { label: 'Completed',  cls: 'st-done' },
  RELEASING:        { label: 'Ongoing',    cls: 'st-airing' },
  NOT_YET_RELEASED: { label: 'Upcoming',   cls: 'st-upcoming' },
  HIATUS:           { label: 'On Hiatus',  cls: 'st-hiatus' },
  CANCELLED:        { label: 'Cancelled',  cls: 'st-cancelled' },
};
function statusLabel(s) { return STATUS_MAP[s] || { label: s || '—', cls: '' }; }

function scoreClass(s) {
  if (!s) return 's-low';
  return s >= 75 ? 's-high' : s >= 58 ? 's-mid' : 's-low';
}

function scoreColor(s) {
  if (!s) return '#6b7280';
  return s >= 75 ? '#22c55e' : s >= 58 ? '#eab308' : '#ef4444';
}

function quickVerdict(s) {
  if (!s) return { cls:'v-maybe', txt:'No rating yet' };
  if (s >= 87) return { cls:'v-yes',   txt:'🔥 Must Watch/Read' };
  if (s >= 75) return { cls:'v-yes',   txt:'👍 Highly Recommended' };
  if (s >= 63) return { cls:'v-maybe', txt:'🤔 Worth a Try' };
  if (s >= 50) return { cls:'v-maybe', txt:'⚖️ Mixed Reception' };
  return       { cls:'v-skip',  txt:'⏭️ Approach With Caution' };
}

function fullVerdict(score, sent) {
  const pos = sent ? sent.pos : 0.5;
  score = score || 0;
  if (score >= 87 && pos >= .5)
    return { cls:'v-yes',  txt:'✅ Absolutely — a beloved title with outstanding community love. Do not skip.' };
  if (score >= 80)
    return { cls:'v-yes',  txt:'✅ Yes — excellent ratings and broadly positive reception. Well worth your time.' };
  if (score >= 73)
    return { cls:'v-yes',  txt:'👍 Recommended — solid scores and generally warm community response.' };
  if (score >= 63 && pos >= .4)
    return { cls:'v-maybe',txt:'🤔 Worth a try — decent quality and fans seem to enjoy it.' };
  if (score >= 63)
    return { cls:'v-maybe',txt:'🤔 Proceed carefully — decent but community opinions are split.' };
  if (score >= 50)
    return { cls:'v-maybe',txt:'⚠️ Niche appeal — low-to-mid scores and mixed community reception.' };
  return   { cls:'v-skip', txt:'⏭️ Probably skip — ratings and community discussions suggest it isn\'t worth the time.' };
}

// ── AniList ────────────────────────────────────────────────

async function aniList(vars) {
  // AniList rejects null variable values — strip them before sending
  const clean = Object.fromEntries(Object.entries(vars).filter(([,v])=>v!=null));
  const r = await fetch(ANILIST, {
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body: JSON.stringify({ query: buildQuery(), variables: clean })
  });
  if (!r.ok) {
    if (r.status === 429) throw new Error('AniList rate limit reached — please wait a moment.');
    throw new Error(`AniList error (${r.status})`);
  }
  const j = await r.json();
  if (j.errors) throw new Error(j.errors.map(e=>e.message).join('; '));
  return j.data.Page.media || [];
}

function buildVars(extra = {}) {
  return {
    page:1, perPage:50,
    score: S.minScore > 0 ? S.minScore : null,
    genres: S.genres.length ? S.genres : null,
    search: S.search || null,
    ...extra
  };
}

async function load() {
  if (S.loading) return;
  S.loading = true;
  showLoading(true);
  showSkeletons();
  clearError();

  try {
    let items;
    if (S.type === 'all') {
      const [a, m] = await Promise.all([
        aniList(buildVars({ type:'ANIME', perPage:25 })),
        aniList(buildVars({ type:'MANGA', perPage:25 }))
      ]);
      items = [...a, ...m].sort((x,y)=>(y.averageScore||0)-(x.averageScore||0));
    } else if (S.type === 'anime') {
      items = await aniList(buildVars({ type:'ANIME' }));
    } else if (S.type === 'manga') {
      items = await aniList(buildVars({ type:'MANGA', country:'JP' }));
    } else {
      items = await aniList(buildVars({ type:'MANGA', country:'KR' }));
    }
    // AND-filter: keep only titles that have every selected genre
    if (S.genres.length > 1) {
      items = items.filter(item =>
        S.genres.every(g => (item.genres || []).includes(g))
      );
    }
    window._lastItems = items;
    renderCards(items);
  } catch (err) {
    showError(err.message);
    window._lastItems = [];
    renderCards([]);
  } finally {
    S.loading = false;
    showLoading(false);
  }
}

function timeAgo(utc) {
  const s = Math.floor(Date.now() / 1000) - utc;
  if (s < 60)   return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400)return `${Math.floor(s/3600)}h ago`;
  if (s < 2592000) return `${Math.floor(s/86400)}d ago`;
  if (s < 31536000)return `${Math.floor(s/2592000)}mo ago`;
  return `${Math.floor(s/31536000)}y ago`;
}

// ── Reddit ────────────────────────────────────────────────

async function fetchReddit(t, kind) {
  const sub = kind === 'anime' ? 'anime' : kind === 'manhwa' ? 'manhwa' : 'manga';
  const q   = encodeURIComponent(t.replace(/['"]/g,'').slice(0,60));
  const url = `https://www.reddit.com/r/${sub}/search.json?q=${q}&sort=relevance&limit=6&restrict_sr=1&t=all`;
  const r   = await fetch(url, { headers:{ 'Accept':'application/json' } });
  if (!r.ok) throw new Error(`Reddit ${r.status}`);
  const j = await r.json();
  const posts = (j.data?.children?.map(c=>c.data) || [])
    .sort((a,b) => b.created_utc - a.created_utc);
  return { posts, sub };
}

function sentiment(posts) {
  if (!posts.length) return null;
  let pos=0, neg=0;
  for (const p of posts) {
    const t = (p.title+' '+(p.selftext||'')).toLowerCase();
    for (const w of POS) if (t.includes(w)) pos++;
    for (const w of NEG) if (t.includes(w)) neg++;
  }
  const n  = posts.length;
  const tot = pos + neg + n;
  return {
    pos: (pos + n * .25) / tot,
    neg: (neg + n * .08) / tot,
    get neu() { return 1 - this.pos - this.neg; }
  };
}

// ── Render ────────────────────────────────────────────────

function showSkeletons() {
  const g = document.getElementById('card-grid');
  g.innerHTML = Array(16).fill(0).map(()=>`
    <div class="skel">
      <div class="skel-cover"></div>
      <div class="skel-body">
        <div class="skel-line"></div>
        <div class="skel-line s"></div>
        <div class="skel-line"></div>
        <div class="skel-line xs"></div>
      </div>
    </div>`).join('');
  document.getElementById('results-count').textContent = 'Loading…';
}

function sortItems(items) {
  if (!S.sortCol) return items;
  const dir = S.sortDir === 'asc' ? 1 : -1;
  return [...items].sort((a, b) => {
    switch (S.sortCol) {
      case 'title':  return dir * title(a).localeCompare(title(b));
      case 'type':   return dir * mediaKind(a).localeCompare(mediaKind(b));
      case 'status': return dir * (a.status||'').localeCompare(b.status||'');
      case 'score':  return dir * ((a.averageScore||0) - (b.averageScore||0));
      default:       return 0;
    }
  });
}

function renderCards(items) {
  const g = document.getElementById('card-grid');
  document.getElementById('results-count').textContent =
    items.length ? `${items.length} title${items.length!==1?'s':''}` : '0 titles';

  if (!items.length) {
    g.className = 'card-grid';
    g.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <strong>No results found</strong>
      <p>Try adjusting your filters or search query.</p>
    </div>`;
    return;
  }

  if (S.view === 'table') {
    g.className = '';
    g.style.display = 'block';
    const sorted = sortItems(items);
    const sortIcon = col => {
      const active = S.sortCol === col;
      const icon = active ? (S.sortDir === 'asc' ? '▲' : '▼') : '▲';
      return `<i class="sort-icon">${icon}</i>`;
    };
    const thCls = col => S.sortCol === col ? 'sorted' : '';
    g.innerHTML = `<div style="overflow-x:auto"><table class="title-table">
      <thead><tr>
        <th style="width:52px"></th>
        <th data-col="title" class="${thCls('title')}">Title${sortIcon('title')}</th>
        <th data-col="type"  class="${thCls('type')}">Type${sortIcon('type')}</th>
        <th data-col="status" class="${thCls('status')}">Status${sortIcon('status')}</th>
        <th class="tbl-hide">Eps / Ch</th>
        <th class="tbl-hide">Genres</th>
        <th class="tbl-hide">Platforms</th>
        <th data-col="score" class="${thCls('score')}">Score${sortIcon('score')}</th>
        <th class="tbl-hide">Verdict</th>
      </tr></thead>
      <tbody>${sorted.map(item => tableRowHtml(item)).join('')}</tbody>
    </table></div>`;
    g.querySelectorAll('tr[data-id]').forEach(row => {
      row.addEventListener('click', () => openModal(items.find(x=>x.id===parseInt(row.dataset.id))));
    });
    g.querySelectorAll('th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (S.sortCol === col) {
          S.sortDir = S.sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          S.sortCol = col;
          S.sortDir = col === 'score' ? 'desc' : 'asc';
        }
        renderCards(items);
      });
    });
  } else {
    g.className = 'card-grid';
    g.style.display = '';
    g.innerHTML = items.map((item, i) => cardHtml(item, i)).join('');
    g.querySelectorAll('.card').forEach(c => {
      c.addEventListener('click', () => openModal(items.find(x=>x.id===parseInt(c.dataset.id))));
    });
  }
}

function tableRowHtml(item) {
  const t     = title(item);
  const kind  = mediaKind(item);
  const sc    = item.averageScore;
  const v     = quickVerdict(sc);
  const sl    = statusLabel(item.status);
  const gs    = (item.genres||[]).slice(0,3);
  const ep    = epCount(item);
  const links = streamLinks(item).slice(0,3);

  return `<tr data-id="${item.id}">
    <td><img class="tbl-thumb" src="${item.coverImage?.large||''}" alt=""
         onerror="this.style.visibility='hidden'"></td>
    <td>
      <div class="tbl-title">${t}</div>
      ${item.title.romaji && item.title.english ? `<div class="tbl-sub">${item.title.romaji}</div>` : ''}
    </td>
    <td><span class="card-format fmt-${kind}" style="position:static;display:inline-block">${kind}</span></td>
    <td>${item.status ? `<span class="status-tag ${sl.cls}">${sl.label}</span>` : '—'}</td>
    <td class="tbl-hide">${epBadgeHtml(item) || '—'}</td>
    <td class="tbl-hide"><div class="tbl-genres">${gs.map(g=>`<span class="genre-tag${S.genres.includes(g)?' active':''}">${g}</span>`).join('')}</div></td>
    <td class="tbl-hide"><div class="platforms" style="gap:3px">${links.map(l=>`<span class="platform-chip">${l.site}</span>`).join('') || '—'}</div></td>
    <td><span class="tbl-score" style="color:${scoreColor(sc)}">${sc ? '★ '+(sc/10).toFixed(1) : '—'}</span></td>
    <td class="tbl-hide"><span class="card-verdict ${v.cls}" style="white-space:nowrap">${v.txt}</span></td>
  </tr>`;
}

function cardHtml(item, i) {
  const t      = title(item);
  const kind   = mediaKind(item);
  const v      = quickVerdict(item.averageScore);
  const syn    = stripHtml(item.description);
  const gs     = (item.genres||[]).slice(0,3);
  const sc     = item.averageScore;
  const ep     = epCount(item);
  const links  = streamLinks(item).slice(0,3);
  const delay  = Math.min(i * .04, .5);

  return `<div class="card" data-id="${item.id}" style="animation-delay:${delay}s">
    <div class="card-cover">
      <img src="${item.coverImage?.large||''}" alt="${t.replace(/"/g,'&quot;')}" loading="lazy"
           onerror="this.parentElement.style.background='#1e1e2e'">
      <span class="card-format fmt-${kind}">${kind}</span>
      ${sc ? `<span class="card-score ${scoreClass(sc)}">★ ${(sc/10).toFixed(1)}</span>` : ''}
    </div>
    <div class="card-body">
      <div class="card-title">${t}</div>
      <div class="card-meta-row">
        ${item.status ? `<span class="status-tag ${statusLabel(item.status).cls}">${statusLabel(item.status).label}</span>` : ''}
        ${epBadgeHtml(item)}
        ${item.startDate?.year ? `<span class="year-chip">${item.startDate.year}</span>` : ''}
      </div>
      <div class="card-genres">${gs.map(g=>`<span class="genre-tag${S.genres.includes(g)?' active':''}">${g}</span>`).join('')}</div>
      <div class="card-synopsis">${syn||'No synopsis available.'}</div>
      ${links.length ? `<div class="platforms">${links.map(l=>`<span class="platform-chip">${l.site}</span>`).join('')}</div>` : ''}
      <div class="card-verdict ${v.cls}">${v.txt}</div>
    </div>
  </div>`;
}

// ── Modal ────────────────────────────────────────────────

function openModal(item) {
  if (!item) return;
  const t    = title(item);
  const kind = mediaKind(item);
  const sc   = item.averageScore;
  const disp = sc ? (sc/10).toFixed(1) : '—';
  const qv   = quickVerdict(sc);
  const syn  = stripHtml(item.description);

  const meta = [];
  if (item.format)         meta.push(item.format.replace(/_/g,' '));
  if (item.startDate?.year)meta.push(item.startDate.year);
  if (item.episodes)       meta.push(`${item.episodes} ep`);
  if (item.chapters)       meta.push(`${item.chapters} ch`);
  if (item.status)         meta.push(statusLabel(item.status).label);

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-poster">
        <img src="${item.coverImage?.large||''}" alt="${t.replace(/"/g,'&quot;')}"
             onerror="this.parentElement.style.display='none'">
      </div>
      <div class="modal-info">
        <div class="modal-title">${t}</div>
        <div class="modal-badges">
          <span class="card-format fmt-${kind}" style="position:static;display:inline-block">${kind.toUpperCase()}</span>
          ${meta.map(m=>`<span class="meta-chip">${m}</span>`).join('')}
        </div>
        <div class="score-row">
          <div class="big-score" style="color:${scoreColor(sc)}">${disp}</div>
          <div class="score-meta">
            <div class="score-label">AniList Score / 10</div>
            <div class="score-bar-bg">
              <div class="score-bar-fill" style="width:${sc||0}%;background:${scoreColor(sc)}"></div>
            </div>
          </div>
        </div>
        <div class="modal-genres">${(item.genres||[]).map(g=>`<span class="genre-tag">${g}</span>`).join('')}</div>
        ${streamLinks(item).length ? `<div class="platforms" style="margin-top:10px">${streamLinks(item).map(l=>`<a href="${l.url}" target="_blank" rel="noopener" class="platform-chip" style="text-decoration:none">${l.site}</a>`).join('')}</div>` : ''}
      </div>
    </div>
    <div class="modal-body">
      <div class="section-title">Synopsis</div>
      <div class="synopsis-text">${syn||'No synopsis available.'}</div>

      <div class="section-title">Reddit Community Sentiment</div>
      <div class="reddit-box" id="reddit-box">
        <div class="reddit-loading"><div class="spinner"></div> Fetching community discussions…</div>
      </div>

      <div class="section-title">Should You Watch/Read This?</div>
      <div class="verdict-box ${qv.cls}" id="verdict-box">
        <div class="verdict-lbl">Verdict</div>
        <div class="verdict-txt">${qv.txt} — loading community data…</div>
      </div>
    </div>`;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  loadRedditForModal(t, kind, sc);
}

async function loadRedditForModal(t, kind, score) {
  const box     = document.getElementById('reddit-box');
  const vbox    = document.getElementById('verdict-box');
  if (!box) return;

  try {
    const { posts, sub } = await fetchReddit(t, kind);
    const sent = sentiment(posts);
    const v    = fullVerdict(score, sent);

    if (!posts.length) {
      box.innerHTML = `<p style="color:var(--muted);font-size:.83rem">No recent Reddit discussions found for this title in r/${sub}.</p>`;
    } else {
      const pp = sent ? Math.round(sent.pos * 100) : 33;
      const np = sent ? Math.round(sent.neg * 100) : 17;
      const nu = Math.max(0, 100 - pp - np);

      box.innerHTML = `
        <div style="font-size:.79rem;color:var(--muted);margin-bottom:4px">
          Based on ${posts.length} recent post${posts.length!==1?'s':''} from r/${sub}
        </div>
        <div class="sentiment-bar">
          <div class="sent-pos" style="width:${pp}%"></div>
          <div class="sent-neu" style="width:${nu}%"></div>
          <div class="sent-neg" style="width:${np}%"></div>
        </div>
        <div class="sentiment-labels">
          <span style="color:var(--green)">Positive ${pp}%</span>
          <span>Neutral ${nu}%</span>
          <span style="color:var(--red)">Negative ${np}%</span>
        </div>
        <div class="reddit-posts">
          ${posts.map(p=>`
            <div class="reddit-post">
              <div class="post-title">${p.title.replace(/</g,'&lt;')}</div>
              <div class="post-meta">
                <span class="post-score-val">↑ ${(p.score||0).toLocaleString()}</span>
                <span>${p.num_comments} comments</span>
                <span>u/${p.author}</span>
                <span>${new Date(p.created_utc*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span>
              </div>
            </div>`).join('')}
        </div>`;
    }

    if (vbox) {
      vbox.className = `verdict-box ${v.cls}`;
      vbox.innerHTML = `<div class="verdict-lbl">Should You Watch/Read This?</div>
                        <div class="verdict-txt">${v.txt}</div>`;
    }
  } catch (err) {
    if (box) box.innerHTML = `<p style="color:var(--muted);font-size:.83rem">
      Reddit data unavailable (${err.message.includes('429') ? 'rate limited' : 'network or CORS restriction'}).
      ${(score||0)>=75 ? 'The AniList score alone suggests it\'s worth watching.' : ''}
    </p>`;
    if (vbox) {
      const v = fullVerdict(score, null);
      vbox.className = `verdict-box ${v.cls}`;
      vbox.innerHTML = `<div class="verdict-lbl">Should You Watch/Read This? (AniList score only)</div>
                        <div class="verdict-txt">${v.txt}</div>`;
    }
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── UI helpers ────────────────────────────────────────────

function showLoading(on) {
  document.getElementById('loading-spinner').classList.toggle('active', on);
}

function showError(msg) {
  document.getElementById('error-container').innerHTML =
    `<div class="error-banner">⚠️ ${msg}</div>`;
}

function clearError() {
  document.getElementById('error-container').innerHTML = '';
}

// ── Events ────────────────────────────────────────────────

document.querySelectorAll('[data-type]').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('[data-type]').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');
    S.type = p.dataset.type;
    load();
  });
});

// ── Genre picker ──────────────────────────────────────────
(function() {
  const grid = document.getElementById('genre-pills-grid');
  const btn  = document.getElementById('genre-btn');
  const lbl  = document.getElementById('genre-btn-label');
  const dd   = document.getElementById('genre-dropdown');

  // Build pills
  ALL_GENRES.forEach(g => {
    const p = document.createElement('button');
    p.className = 'genre-pill-opt';
    p.textContent = g;
    p.addEventListener('click', () => {
      const i = S.genres.indexOf(g);
      if (i === -1) S.genres.push(g); else S.genres.splice(i, 1);
      p.classList.toggle('sel', S.genres.includes(g));
      updateGenreBtn();
      load();
    });
    grid.appendChild(p);
  });

  function updateGenreBtn() {
    const n = S.genres.length;
    lbl.textContent = n === 0 ? 'Any Genre' : n === 1 ? S.genres[0] : `${n} genres`;
    btn.classList.toggle('has-selection', n > 0);
  }

  btn.addEventListener('click', e => {
    e.stopPropagation();
    dd.classList.toggle('open');
  });

  document.getElementById('genre-clear').addEventListener('click', () => {
    S.genres = [];
    grid.querySelectorAll('.genre-pill-opt').forEach(p => p.classList.remove('sel'));
    updateGenreBtn();
    load();
  });

  document.addEventListener('click', e => {
    if (!document.getElementById('genre-picker').contains(e.target)) {
      dd.classList.remove('open');
    }
  });
})();

document.getElementById('rating-filter').addEventListener('input', e => {
  const v = parseInt(e.target.value);
  S.minScore = v;
  document.getElementById('rating-display').textContent = v > 0 ? `${v/10}+` : 'Any';
});
document.getElementById('rating-filter').addEventListener('change', load);

document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const v = e.target.value.trim();
  searchTimer = setTimeout(() => { S.search = v; load(); }, 520);
});

document.querySelectorAll('[data-status]').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('[data-status]').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    S.status = pill.dataset.status;
    load();
  });
});

document.getElementById('btn-grid').addEventListener('click', () => {
  S.view = 'grid';
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-table').classList.remove('active');
  renderCards(window._lastItems || []);
});
document.getElementById('btn-table').addEventListener('click', () => {
  S.view = 'table';
  document.getElementById('btn-table').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
  renderCards(window._lastItems || []);
});

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target.id === 'modal-overlay') closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Init ──────────────────────────────────────────────────
load();
</script>
</body>
</html>
